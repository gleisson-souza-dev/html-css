<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vamos trabalhar com tabelas. Especificamente com Mesclagem de células">
    <title>
        Tabelas
    </title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            

        }

        table{
            border-collapse: collapse;
            width: 300px;
            height: 300px;
            text-align: center;
            vertical-align: middle;
        }
        
        td{
            border: 1px solid black;
            padding: 10px;

        }


    </style>
    
</head>

<body>
    <h1>Mesclagem de Células</h1>
    <table>
        <tr>
            <td>A</td>
            <td colspan="2">B</td>
            
        
        </tr>

        <tr>
            <td rowspan="3">D</td>
            <td>E</td>
            <td rowspan="2">F</td>
        
        </tr>
        <tr>
           
            <td>H</td>
           

        </tr>
        
        <tr>
            
            <td colspan="2">M</td>

        </tr>

    </table>

</body>

</html>
