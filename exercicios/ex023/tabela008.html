 <!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Colunas de tabelas</title>

    <style>
        table{
            border-collapse: collapse;
            width: 300px;
            text-align: center;
        }

        th, td{
            border: 1px solid black;

        }

        .amarelo{
            background-color: yellow;

        }

        .amarelo2, .amarelo3, .amarelo4{
            background-color: rgba(255, 255, 0, 0.541);
            
        }


    </style>

</head>
<body>
    
    <table>
        <colgroup>
            <col class="amarelo">
            <col class="amarelo2">
            <col class="amarelo3">
            <col class="amarelo4">
            
        </colgroup>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
            
        </tr>

        <tr>
            <td>Ana</td>
            <td>F</td>
            <td>32</td>
            <td>Faxineira</td>
        
        </tr>

        <tr>
            <td>Maria</td>
            <td>F</td>
            <td>40</td>
            <td>Advogada</td>
        
        </tr>
        <tr>
            <td>Jose</td>
            <td>M</td>
            <td>50</td>
            <td>Pedreiro</td>

        </tr>


    </table>

</body>
</html>
