<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Desafio 4
    </title>

    <style>
        table{
            border-collapse: collapse;
            width: 400px;
            height: 300px;
            font-family: Arial, Helvetica, sans-serif;

            text-align: center;
            
            
        }

        caption{
            padding: 10px;
            font-size: 1.5em;
            
        }


        th, td{
            border: 1px solid black;
            padding: 3px;

        }

        th{

            color: white;
        }

    </style>


</head>
<body>

                <th scope="col" rowspan="2">Média</th>  

            </tr>

            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>

            </tr>

        </thead>
        <tbody>
            <tr>
                <th style="background-color: white; color: black;" rowspan="4" scope="rowgroup"><strong>Exatas</strong></th>
                <td>Matemática</td>
                <td>0.0</td>

                <td>0.0</td>

            </tr>

            <tr>
                <td>Física</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>

            </tr>

            <tr>
                <td>Química</td>
                <td>0.0</td>

                <td>0.0</td>

            </tr>
            <tr>
                <td>Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>

            </tr>

            <tr>
                <th style="text-align: left; text-indent: 8px" colspan="4" scope="col">Média de Exatas</th>

                <td style="background-color: rgb(101, 100, 99); color: white;">0.0</td>

            </tr>

            <tr>
                <th style="background-color: white; color: black;" rowspan="2" scope="rowgroup"><strong>Humanas</strong></th>
                <td>História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>

            </tr>

            <tr>
                <td>Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>

            </tr>

            <tr>
                <th style="text-align: left; text-indent: 8px;" colspan="4" scope="row">Média de Humanas</th>

                <td style="background-color: rgb(101, 100, 99); color: white;">0.0</td>
            </tr>

        </tbody>

    </table>

</html>
