<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de Iframe</title>

    <style>
        iframe{
            height: 400px;
            width: 350px;
            
        }
    </style>

 
</head>
<body>
    <h1>Testando o uso de Iframe</h1>
    
    <div>
        <p>Acessando o site do CursoEmVideo para aprender a programar.</p>
        <iframe src="https://www.cursoemvideo.com" frameborder="0">
            <a href="https://www.cursoemvideo.com" target="_blank">Curso em Video</a>   
        
        </iframe>
        
    </div>


    <div>
        <p>O site do também é muito legal!</p>
        <iframe src="https://google.com.br" frameborder="0">
            <a href="https://google.com.br" target="_blank">Google</a>
        </iframe>

    </div>
</body>
</html>
