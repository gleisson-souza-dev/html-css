<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixas Dinâmicas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Caixas Dinâmicas Responsivas</h1>
</header>

<main>
    <div class="caixa-azul caixa">
        <p>Altura: <strong>50vh</strong> (viewport inicial)</p>
    </div>

    <div class="caixa-verde caixa">
        <p>Altura: <strong>50dvh</strong> (viewport dinâmico)</p>
    </div>

    <div class="caixa-vermelha caixa">
        <p>Altura: <strong>100px</strong> (fixa)</p>
    </div>
</main>

<footer>
    <p>Footer Responsivo</p>
</footer>

</body>
</html>
